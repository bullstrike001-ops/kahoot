<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizBlast — Live Game</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="main-screen">

  <!-- Header -->
  <header class="main-header">
    <div class="logo">
      <span class="logo-icon">⚡</span>
      QuizBlast
    </div>
    <a href="/host" class="btn btn-primary" style="padding:0.6rem 1.4rem;font-size:0.9rem;">
      Host Panel
    </a>
  </header>

  <!-- Body: PIN + QR | Players -->
  <main class="main-body">

    <!-- Left column -->
    <div>
      <!-- PIN -->
      <div class="glass-card pin-section">
        <p class="pin-label">Game PIN</p>
        <div class="pin-value" id="pin-display">——</div>
        <p class="join-url" id="join-url">Loading…</p>
      </div>

      <!-- Players -->
      <div class="players-section mt-2">
        <div class="players-header">
          <span class="players-title">Players</span>
          <span class="player-count-badge" id="player-count">0</span>
        </div>
        <div class="players-grid" id="players-grid">
          <span class="waiting-msg">Waiting for players to join…</span>
        </div>
      </div>
    </div>

    <!-- Right column: QR -->
    <div class="glass-card qr-section">
      <p class="qr-title">Scan to join</p>
      <div class="qr-container">
        <img id="qr-image" src="" alt="QR Code" width="260" height="260" />
      </div>
      <p class="join-url mt-2" id="qr-url-text" style="font-size:0.8rem;">Generating…</p>
    </div>

  </main>
</div>

<!-- Countdown overlay (hidden until game starts) -->
<div class="countdown-overlay hidden" id="countdown-overlay">
  <p class="countdown-label">Starting in…</p>
  <div class="countdown-number" id="countdown-number">10</div>
  <p class="countdown-sublabel">Get ready!</p>
</div>

<!-- Reveal overlay (hidden until reveal) -->
<div class="reveal-overlay hidden" id="reveal-overlay">
  <div class="reveal-emoji">😄</div>
  <div class="reveal-title">APRIL FOOLS!</div>
  <div class="reveal-subtitle">No quiz today! 🎉</div>
</div>

<!-- Confetti container -->
<div class="confetti-container hidden" id="confetti-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/client.js"></script>
<script>
  const pinDisplay    = document.getElementById('pin-display');
  const joinUrlEl     = document.getElementById('join-url');
  const qrUrlText     = document.getElementById('qr-url-text');
  const qrImage       = document.getElementById('qr-image');
  const playersGrid   = document.getElementById('players-grid');
  const playerCount   = document.getElementById('player-count');
  const cntOverlay    = document.getElementById('countdown-overlay');
  const confettiCont  = document.getElementById('confetti-container');
  const revealOverlay = document.getElementById('reveal-overlay');

  let currentNumberEl = document.getElementById('countdown-number');

  // ── Load QR code via API ──────────────────────────────────────────────
  function loadQR() {
    fetch('/qrcode')
      .then(r => r.json())
      .then(data => {
        qrImage.src = data.dataUrl;
        qrUrlText.textContent = data.url;
        joinUrlEl.textContent = data.url;
      })
      .catch(() => {
        qrUrlText.textContent = 'QR generation failed';
      });
  }

  // ── Render players list ───────────────────────────────────────────────
  function renderPlayers(players) {
    playerCount.textContent = players.length;
    playersGrid.innerHTML = '';
    if (players.length === 0) {
      playersGrid.innerHTML = '<span class="waiting-msg">Waiting for players to join…</span>';
      return;
    }
    players.forEach(p => {
      playersGrid.appendChild(renderPlayerChip(p));
    });
  }

  // ── Handle phase changes ──────────────────────────────────────────────
  function applyPhase(phase, countdownValue) {
    if (phase === 'countdown') {
      showCountdown(countdownValue, cntOverlay, currentNumberEl);
      currentNumberEl = document.getElementById('countdown-number') || cntOverlay.querySelector('.countdown-number');
    } else if (phase === 'reveal') {
      cntOverlay.classList.add('hidden');
      confettiCont.classList.remove('hidden');
      showReveal(revealOverlay, confettiCont);
    }
  }

  // ── Socket events ─────────────────────────────────────────────────────
  const sock = getSocket();

  sock.on('state-update', ({ pin, players, phase, countdownValue }) => {
    pinDisplay.textContent = pin;
    renderPlayers(players);
    loadQR();
    applyPhase(phase, countdownValue);
  });

  sock.on('players-update', ({ players }) => {
    renderPlayers(players);
  });

  sock.on('phase-change', ({ phase, countdownValue }) => {
    applyPhase(phase, countdownValue);
  });

  sock.on('countdown-tick', ({ value }) => {
    currentNumberEl = setCountdownNumber(value, currentNumberEl);
  });

  sock.on('game-reset', ({ pin, players }) => {
    pinDisplay.textContent = pin;
    cntOverlay.classList.add('hidden');
    revealOverlay.classList.add('hidden');
    confettiCont.classList.add('hidden');
    confettiCont.innerHTML = '';
    renderPlayers(players);
    loadQR();
  });
</script>
</body>
</html>
