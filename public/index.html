<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kahoot!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', 'Nunito', Arial, sans-serif;
      background: #46178f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #join-screen {
      text-align: center;
      padding: 40px 20px;
      width: 100%;
      max-width: 380px;
    }

    .logo {
      font-size: 2.8rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -1px;
      margin-bottom: 32px;
    }

    .logo span { color: #f9c; }

    input[type="text"] {
      width: 100%;
      padding: 18px 20px;
      font-size: 1.2rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      outline: none;
      text-align: center;
      margin-bottom: 16px;
      color: #333;
    }

    input[type="text"]::placeholder { color: #aaa; font-weight: 400; }

    .btn-enter {
      width: 100%;
      padding: 18px;
      font-size: 1.2rem;
      font-weight: 900;
      background: #28a745;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s;
    }

    .btn-enter:hover { background: #218838; }
    .btn-enter:disabled { background: #555; cursor: not-allowed; }

    #waiting-screen {
      display: none;
      text-align: center;
      padding: 40px 20px;
      color: #fff;
    }

    .spinner {
      width: 64px;
      height: 64px;
      border: 6px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .waiting-title {
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .waiting-sub {
      font-size: 1rem;
      opacity: 0.8;
    }

    #prank-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: #ff0000;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .prank-text {
      font-size: clamp(1.8rem, 6vw, 3.5rem);
      font-weight: 900;
      color: #fff;
      line-height: 1.3;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

  <div id="join-screen">
    <div class="logo">kah<span>oo</span>t!</div>
    <input type="text" id="nickname" placeholder="Nickname" maxlength="30" autocomplete="off" />
    <button class="btn-enter" id="btn-enter">Enter</button>
  </div>

  <div id="waiting-screen">
    <div class="spinner"></div>
    <div class="waiting-title" id="waiting-title">You're in!</div>
    <div class="waiting-sub" id="waiting-sub">Loading...</div>
  </div>

  <div id="prank-screen">
    <div class="prank-text">
      PĂCĂLEALĂ DE 1 APRILIE!<br>
      Puneți telefoanele în buzunare,<br>
      trecem la lucrul manual.
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const joinScreen = document.getElementById('join-screen');
    const waitingScreen = document.getElementById('waiting-screen');
    const prankScreen = document.getElementById('prank-screen');
    const nicknameInput = document.getElementById('nickname');
    const btnEnter = document.getElementById('btn-enter');
    const waitingTitle = document.getElementById('waiting-title');
    const waitingSub = document.getElementById('waiting-sub');

    btnEnter.addEventListener('click', () => {
      const nickname = nicknameInput.value.trim();
      if (!nickname) { nicknameInput.focus(); return; }
      socket.emit('joinGame', nickname);
    });

    nicknameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btnEnter.click();
    });

    socket.on('joined', (nickname) => {
      joinScreen.style.display = 'none';
      waitingScreen.style.display = 'block';
      waitingTitle.textContent = `You're in, ${nickname}!`;
      waitingSub.textContent = 'Waiting for the game to start...';
    });

    socket.on('gameFull', () => {
      alert('Game is full! (40/40 players)');
    });

    socket.on('gameStarted', () => {
      waitingTitle.textContent = 'Loading game...';
      waitingSub.textContent = 'Get ready!';
      setTimeout(() => {
        waitingScreen.style.display = 'none';
        prankScreen.style.display = 'flex';
      }, 10000);
    });
  </script>
</body>
</html>
