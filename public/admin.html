<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kahoot! – Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', 'Nunito', Arial, sans-serif;
      background: #46178f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    #lobby-screen { text-align: center; padding: 40px; }

    .logo {
      font-size: 5rem;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 16px;
    }

    .logo span { color: #f9c; }

    .waiting-msg {
      font-size: 1.6rem;
      font-weight: 600;
      opacity: 0.85;
      margin-bottom: 40px;
    }

    .player-count-box {
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 30px 60px;
      margin-bottom: 50px;
      display: inline-block;
    }

    .player-count {
      font-size: 5rem;
      font-weight: 900;
      line-height: 1;
    }

    .player-label {
      font-size: 1.1rem;
      opacity: 0.8;
      margin-top: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .btn-start {
      padding: 28px 80px;
      font-size: 2rem;
      font-weight: 900;
      background: #28a745;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.3);
      transition: background 0.15s, transform 0.1s;
    }

    .btn-start:hover { background: #218838; transform: scale(1.03); }
    .btn-start:active { transform: scale(0.98); }

    #loading-screen {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .spinner {
      width: 100px;
      height: 100px;
      border: 10px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 40px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 3rem;
      font-weight: 900;
    }

    #prank-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: #ff0000;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 40px;
    }

    .prank-text {
      font-size: clamp(2.5rem, 5vw, 5rem);
      font-weight: 900;
      color: #fff;
      line-height: 1.3;
      text-shadow: 3px 3px 12px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

  <div id="lobby-screen">
    <div class="logo">kah<span>oo</span>t!</div>
    <div class="waiting-msg">Waiting for players...</div>

    <div class="player-count-box">
      <div class="player-count"><span id="count">0</span>/40</div>
      <div class="player-label">players connected</div>
    </div>

    <br />
    <button class="btn-start" id="btn-start">START GAME</button>
  </div>

  <div id="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">Loading game...</div>
  </div>

  <div id="prank-screen">
    <div class="prank-text">
      PĂCĂLEALĂ DE 1 APRILIE!<br>
      Puneți telefoanele în buzunare,<br>
      trecem la lucrul manual.
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const lobbyScreen = document.getElementById('lobby-screen');
    const loadingScreen = document.getElementById('loading-screen');
    const prankScreen = document.getElementById('prank-screen');
    const countEl = document.getElementById('count');
    const btnStart = document.getElementById('btn-start');

    socket.emit('adminConnect');

    socket.on('playerCount', (count) => {
      countEl.textContent = count;
    });

    btnStart.addEventListener('click', () => {
      socket.emit('startGame');
    });

    socket.on('gameStarted', () => {
      lobbyScreen.style.display = 'none';
      loadingScreen.style.display = 'block';
      setTimeout(() => {
        loadingScreen.style.display = 'none';
        prankScreen.style.display = 'flex';
      }, 10000);
    });
  </script>
</body>
</html>
