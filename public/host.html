<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizBlast — Host Panel</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="host-screen">

  <!-- Header -->
  <div class="host-header">
    <div>
      <div class="logo" style="font-size:1.4rem;">
        <span class="logo-icon">⚡</span>
        QuizBlast
      </div>
      <h1 class="host-title mt-1">Host Control Panel</h1>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem;">
      <div class="host-pin-badge">
        <span class="host-pin-label">PIN</span>
        <span id="host-pin">—</span>
      </div>
      <span class="phase-badge phase-lobby" id="phase-badge">LOBBY</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="host-stats">
    <div class="glass-card stat-card">
      <div class="stat-value" id="stat-players">0</div>
      <div class="stat-label">Players</div>
    </div>
    <div class="glass-card stat-card">
      <div class="stat-value" id="stat-phase">Lobby</div>
      <div class="stat-label">Phase</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="host-controls">
    <button class="btn btn-success btn-lg" id="start-btn">
      ▶ Start Game
    </button>
    <button class="btn btn-danger" id="reset-btn" style="display:none;">
      ↺ Reset Game
    </button>
  </div>

  <p class="error-msg" id="host-error" style="margin-bottom:1rem;"></p>

  <!-- Players list -->
  <div class="glass-card" style="padding:1.25rem;">
    <p class="host-players-title">Connected Players</p>
    <div id="host-player-list" class="host-player-list">
      <p class="host-notice">No players yet. Share the PIN!</p>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/client.js"></script>
<script>
  const hostPin      = document.getElementById('host-pin');
  const phaseBadge   = document.getElementById('phase-badge');
  const statPlayers  = document.getElementById('stat-players');
  const statPhase    = document.getElementById('stat-phase');
  const startBtn     = document.getElementById('start-btn');
  const resetBtn     = document.getElementById('reset-btn');
  const hostError    = document.getElementById('host-error');
  const playerList   = document.getElementById('host-player-list');

  const PHASE_LABELS = { lobby: 'Lobby', countdown: 'Countdown', reveal: 'Reveal' };
  const PHASE_CLASSES = { lobby: 'phase-lobby', countdown: 'phase-countdown', reveal: 'phase-reveal' };

  function updatePhaseUI(phase) {
    const label = PHASE_LABELS[phase] || phase;
    statPhase.textContent = label;
    phaseBadge.textContent = label.toUpperCase();
    phaseBadge.className = 'phase-badge ' + (PHASE_CLASSES[phase] || '');

    if (phase === 'lobby') {
      startBtn.style.display = '';
      startBtn.disabled = false;
      startBtn.textContent = '▶ Start Game';
      resetBtn.style.display = 'none';
    } else if (phase === 'countdown') {
      startBtn.style.display = 'none';
      resetBtn.style.display = '';
    } else if (phase === 'reveal') {
      startBtn.style.display = 'none';
      resetBtn.style.display = '';
    }
  }

  function renderPlayers(players) {
    statPlayers.textContent = players.length;
    playerList.innerHTML = '';
    if (players.length === 0) {
      playerList.innerHTML = '<p class="host-notice">No players yet. Share the PIN!</p>';
      return;
    }
    players.forEach(p => {
      playerList.appendChild(renderPlayerRow(p));
    });
  }

  // ── Socket events ─────────────────────────────────────────────────────
  const sock = getSocket();

  sock.on('state-update', ({ pin, players, phase }) => {
    hostPin.textContent = pin;
    renderPlayers(players);
    updatePhaseUI(phase);
  });

  sock.on('players-update', ({ players }) => {
    renderPlayers(players);
  });

  sock.on('phase-change', ({ phase }) => {
    updatePhaseUI(phase);
  });

  sock.on('host-error', ({ message }) => {
    hostError.textContent = message;
    setTimeout(() => { hostError.textContent = ''; }, 4000);
  });

  sock.on('game-reset', ({ pin, players, phase }) => {
    hostPin.textContent = pin;
    renderPlayers(players);
    updatePhaseUI(phase);
  });

  // ── Controls ──────────────────────────────────────────────────────────
  startBtn.addEventListener('click', () => {
    hostError.textContent = '';
    startBtn.disabled = true;
    startBtn.textContent = 'Starting…';
    sock.emit('host-start');
  });

  resetBtn.addEventListener('click', () => {
    if (confirm('Reset game? All players will be disconnected and a new PIN will be generated.')) {
      sock.emit('host-reset');
    }
  });
</script>
</body>
</html>
