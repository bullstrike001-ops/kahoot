<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>QuizBlast — Join</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="join-screen">

  <!-- Header -->
  <div class="join-header">
    <div class="logo">
      <span class="logo-icon">⚡</span>
      QuizBlast
    </div>
  </div>

  <!-- Join Card -->
  <div class="glass-card join-card" id="join-card">
    <h1 class="join-title">Join the Game</h1>

    <form class="join-form" id="join-form" novalidate>
      <!-- PIN -->
      <div class="form-group">
        <label class="form-label" for="pin-input">Game PIN</label>
        <input
          class="form-input"
          id="pin-input"
          type="text"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="6"
          placeholder="Enter 6-digit PIN"
          autocomplete="off"
          required
        />
        <span class="error-msg" id="pin-error"></span>
      </div>

      <!-- Nickname -->
      <div class="form-group">
        <label class="form-label" for="nickname-input">Your Nickname</label>
        <input
          class="form-input"
          id="nickname-input"
          type="text"
          maxlength="20"
          placeholder="Choose a nickname"
          autocomplete="off"
          required
        />
        <span class="error-msg" id="nick-error"></span>
      </div>

      <!-- Avatar -->
      <div class="form-group">
        <span class="form-label">Pick Your Avatar</span>
        <div class="avatar-grid" id="avatar-grid">
          <!-- filled by JS -->
        </div>
        <span class="error-msg" id="avatar-error"></span>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary btn-lg btn-full" id="join-btn">
        🚀 Join Game
      </button>

      <p class="error-msg text-center" id="global-error"></p>
    </form>
  </div>

  <!-- Joined waiting state (hidden initially) -->
  <div class="glass-card join-card hidden" id="waiting-card">
    <div class="joined-state">
      <div class="joined-avatar-big" id="joined-avatar"></div>
      <div class="joined-name" id="joined-name"></div>
      <div class="joined-sub">You're in! Waiting for the host to start…</div>
      <div class="waiting-dots">
        <div class="waiting-dot"></div>
        <div class="waiting-dot"></div>
        <div class="waiting-dot"></div>
      </div>
    </div>
  </div>

</div>

<!-- Countdown overlay -->
<div class="countdown-overlay hidden" id="countdown-overlay">
  <p class="countdown-label">Starting in…</p>
  <div class="countdown-number" id="countdown-number">10</div>
  <p class="countdown-sublabel">Get ready!</p>
</div>

<!-- Reveal overlay -->
<div class="reveal-overlay hidden" id="reveal-overlay">
  <div class="reveal-emoji">😄</div>
  <div class="reveal-title">APRIL FOOLS!</div>
  <div class="reveal-subtitle">No quiz today! 🎉</div>
</div>

<!-- Confetti -->
<div class="confetti-container hidden" id="confetti-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/client.js"></script>
<script>
  const AVATARS = ['🦊','🐼','🦁','🐯','🐻','🐸','🦋','🦄','🐲','🎮','🎯','🏆','🎸','🚀','⚡','💎','🌈','🔥','👾','🤖'];

  const pinInput     = document.getElementById('pin-input');
  const nicknameInput= document.getElementById('nickname-input');
  const pinError     = document.getElementById('pin-error');
  const nickError    = document.getElementById('nick-error');
  const avatarError  = document.getElementById('avatar-error');
  const globalError  = document.getElementById('global-error');
  const joinForm     = document.getElementById('join-form');
  const joinBtn      = document.getElementById('join-btn');
  const joinCard     = document.getElementById('join-card');
  const waitingCard  = document.getElementById('waiting-card');
  const joinedAvatar = document.getElementById('joined-avatar');
  const joinedName   = document.getElementById('joined-name');
  const avatarGrid   = document.getElementById('avatar-grid');
  const cntOverlay   = document.getElementById('countdown-overlay');
  const confettiCont = document.getElementById('confetti-container');
  const revealOverlay= document.getElementById('reveal-overlay');

  let selectedAvatar = null;
  let currentNumberEl = document.getElementById('countdown-number');

  // ── Pre-fill PIN from URL params ──────────────────────────────────────
  const urlParams = new URLSearchParams(window.location.search);
  const pinFromUrl = urlParams.get('pin');
  if (pinFromUrl) pinInput.value = pinFromUrl;

  // ── Build avatar grid ─────────────────────────────────────────────────
  AVATARS.forEach((emoji, i) => {
    const opt = document.createElement('div');
    opt.className = 'avatar-option';
    opt.textContent = emoji;
    opt.dataset.emoji = emoji;
    opt.addEventListener('click', () => {
      document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      selectedAvatar = emoji;
      avatarError.textContent = '';
    });
    avatarGrid.appendChild(opt);
  });

  // ── Form validation & submit ──────────────────────────────────────────
  joinForm.addEventListener('submit', (e) => {
    e.preventDefault();
    clearErrors();

    const pin = pinInput.value.trim();
    const nickname = nicknameInput.value.trim();
    let valid = true;

    if (!/^\d{6}$/.test(pin)) {
      pinError.textContent = 'PIN must be exactly 6 digits.';
      pinInput.classList.add('is-error');
      valid = false;
    }
    if (nickname.length < 2 || nickname.length > 20) {
      nickError.textContent = 'Nickname must be 2–20 characters.';
      nicknameInput.classList.add('is-error');
      valid = false;
    }
    if (!selectedAvatar) {
      avatarError.textContent = 'Please pick an avatar.';
      valid = false;
    }
    if (!valid) return;

    joinBtn.disabled = true;
    joinBtn.textContent = 'Joining…';

    getSocket().emit('player-join', { pin, nickname, avatar: selectedAvatar });
  });

  function clearErrors() {
    pinError.textContent = '';
    nickError.textContent = '';
    avatarError.textContent = '';
    globalError.textContent = '';
    pinInput.classList.remove('is-error');
    nicknameInput.classList.remove('is-error');
  }

  // ── Socket events ─────────────────────────────────────────────────────
  const sock = getSocket();

  sock.on('join-success', ({ player }) => {
    joinCard.classList.add('hidden');
    joinedAvatar.textContent = player.avatar;
    joinedName.textContent = player.nickname;
    waitingCard.classList.remove('hidden');
  });

  sock.on('join-error', ({ message }) => {
    globalError.textContent = message;
    joinBtn.disabled = false;
    joinBtn.textContent = '🚀 Join Game';
  });

  sock.on('phase-change', ({ phase, countdownValue }) => {
    if (phase === 'countdown') {
      showCountdown(countdownValue, cntOverlay, currentNumberEl);
      currentNumberEl = cntOverlay.querySelector('.countdown-number');
    } else if (phase === 'reveal') {
      cntOverlay.classList.add('hidden');
      confettiCont.classList.remove('hidden');
      showReveal(revealOverlay, confettiCont);
    }
  });

  sock.on('countdown-tick', ({ value }) => {
    currentNumberEl = setCountdownNumber(value, currentNumberEl);
  });

  sock.on('countdown-sync', ({ serverTime, remaining }) => {
    currentNumberEl = setCountdownNumber(remaining, currentNumberEl);
  });

  sock.on('game-reset', ({ pin }) => {
    cntOverlay.classList.add('hidden');
    revealOverlay.classList.add('hidden');
    confettiCont.classList.add('hidden');
    confettiCont.innerHTML = '';
    // If the join form is still visible (player hasn't joined yet), update PIN
    if (waitingCard.classList.contains('hidden')) {
      pinInput.value = pin;
    }
  });

  // Auto-format PIN input to digits only
  pinInput.addEventListener('input', () => {
    pinInput.value = pinInput.value.replace(/\D/g, '').slice(0, 6);
  });
</script>
</body>
</html>
