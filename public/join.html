<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kahoot — Join</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- ── Join Form ─────────────────────────────────────── -->
  <div class="join-container" id="join-view">
    <div class="join-card" id="join-card">
      <div class="join-logo">🎮 KahootPrank</div>
      <h1>Join the Game!</h1>
      <p class="subtitle">Enter your details below to play</p>

      <div class="form-group">
        <label for="pin-input">Game PIN</label>
        <input type="text" id="pin-input" placeholder="Enter PIN" maxlength="10" autocomplete="off" inputmode="numeric" />
      </div>

      <div class="form-group">
        <label for="nickname-input">Nickname</label>
        <input type="text" id="nickname-input" placeholder="Your cool nickname" maxlength="20" autocomplete="off" />
      </div>

      <div class="form-group">
        <label>Pick an Avatar</label>
        <div class="avatar-grid" id="avatar-grid">
          <!-- populated by JS -->
        </div>
      </div>

      <button class="btn-primary" id="join-btn">Join Game 🚀</button>

      <div class="error-msg" id="error-msg"></div>
    </div>

    <!-- Waiting room (shown after successful join in lobby) -->
    <div class="join-card waiting-card" id="waiting-card" style="display:none;">
      <div class="waiting-avatar" id="waiting-avatar">😀</div>
      <h2 id="waiting-nickname">You</h2>
      <p><span class="pulse-dot"></span>Waiting for the host to start…</p>
    </div>
  </div>

  <!-- ── Countdown overlay ──────────────────────────────── -->
  <div class="overlay" id="countdown-overlay">
    <p class="countdown-label">Get Ready!</p>
    <div class="countdown-number" id="countdown-number">10</div>
    <p class="countdown-sub">Game starting…</p>
  </div>

  <!-- ── Reveal overlay ────────────────────────────────── -->
  <div class="overlay" id="reveal-overlay">
    <div class="reveal-emoji">😄</div>
    <div class="reveal-title">APRIL FOOLS!</div>
    <div class="reveal-subtitle">No quiz today!</div>
    <div class="reveal-tagline">Hope you had fun waiting 😂</div>
  </div>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
  <script>
    const socket = io();

    const joinView         = document.getElementById('join-view');
    const joinCard         = document.getElementById('join-card');
    const waitingCard      = document.getElementById('waiting-card');
    const countdownOverlay = document.getElementById('countdown-overlay');
    const revealOverlay    = document.getElementById('reveal-overlay');
    const countdownNumber  = document.getElementById('countdown-number');
    const confettiCanvas   = document.getElementById('confetti-canvas');
    const avatarGrid       = document.getElementById('avatar-grid');
    const pinInput         = document.getElementById('pin-input');
    const nicknameInput    = document.getElementById('nickname-input');
    const joinBtn          = document.getElementById('join-btn');
    const errorMsg         = document.getElementById('error-msg');
    const waitingAvatar    = document.getElementById('waiting-avatar');
    const waitingNickname  = document.getElementById('waiting-nickname');

    // Avatars
    const AVATARS = ['😀','😎','🤩','🥳','🤠','👾','🦄','🐉','🦊','🐺',
                     '🐸','🦋','🌈','🔥','⚡','🎯','🎮','🏆','🚀','💎'];
    let selectedAvatar = AVATARS[0];

    AVATARS.forEach((emoji) => {
      const btn = document.createElement('button');
      btn.className = 'avatar-btn';
      btn.textContent = emoji;
      btn.type = 'button';
      btn.addEventListener('click', () => {
        document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedAvatar = emoji;
      });
      avatarGrid.appendChild(btn);
    });
    // Pre-select first
    avatarGrid.firstChild.classList.add('selected');

    // Pre-fill PIN from URL query param
    const urlParams = new URLSearchParams(location.search);
    if (urlParams.get('pin')) pinInput.value = urlParams.get('pin');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function hideError() {
      errorMsg.classList.remove('visible');
    }

    joinBtn.addEventListener('click', () => {
      const pin      = pinInput.value.trim();
      const nickname = nicknameInput.value.trim();
      if (!pin)      { showError('Please enter the Game PIN.'); return; }
      if (!nickname) { showError('Please enter a nickname.'); return; }
      hideError();
      joinBtn.disabled = true;
      socket.emit('join-game', { pin, nickname, avatar: selectedAvatar });
    });

    socket.on('join-success', ({ nickname, avatar }) => {
      joinCard.style.display = 'none';
      waitingCard.style.display = '';
      waitingAvatar.textContent = avatar;
      waitingNickname.textContent = nickname;
    });

    socket.on('join-error', ({ message }) => {
      showError(message);
      joinBtn.disabled = false;
    });

    function applyState(state, countdown) {
      const inGame = state !== 'lobby';
      joinView.style.display = inGame ? 'none' : '';
      if (state === 'countdown') {
        showCountdownOverlay(countdownOverlay, countdownNumber, countdown || 10);
        hideOverlay(revealOverlay);
      } else if (state === 'reveal') {
        hideOverlay(countdownOverlay);
        showRevealOverlay(revealOverlay, confettiCanvas);
      } else {
        hideOverlay(countdownOverlay);
        hideOverlay(revealOverlay);
      }
    }

    socket.on('init', ({ state, countdown }) => applyState(state, countdown));

    socket.on('phase-change', ({ state, countdown }) => applyState(state, countdown));

    socket.on('countdown-tick', ({ countdown }) => {
      countdownNumber.textContent = countdown;
    });
  </script>
</body>
</html>
